<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>anmarenterprices.com | Secure Login</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* --- CORE VISUALS (Shared) --- */
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -100;
            pointer-events: none;
            overflow: hidden;
        }

        .video-background iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%) scale(1.5);
            pointer-events: none;
            opacity: 0.45;
        }

        /* Overlays */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.2) 50%, rgba(0, 0, 0, 0.2));
            background-size: 100% 4px;
            z-index: -50;
            pointer-events: none;
        }

        .green-tint {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 10%, rgba(16, 185, 129, 0.12), transparent 45%),
                radial-gradient(circle at 80% 90%, rgba(34, 211, 238, 0.1), transparent 40%),
                rgba(6, 12, 10, 0.8);
            z-index: -51;
            pointer-events: none;
        }

        /* --- LOGIN CARD --- */
        .login-card {
            background: rgba(8, 10, 12, 0.72);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 26px;
            padding: 2rem 2rem;
            width: 440px;
            max-width: 92%;
            max-height: calc(100vh - 120px);
            overflow: auto;
            text-align: center;
            box-shadow: 0 26px 60px rgba(0, 0, 0, 0.55);
            position: relative;
            z-index: 10;
            animation: floatUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .login-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 0%, rgba(16, 185, 129, 0.18), transparent 55%),
                radial-gradient(circle at 80% 100%, rgba(34, 211, 238, 0.12), transparent 50%);
            opacity: 0.8;
            pointer-events: none;
        }

        @keyframes floatUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .brand-logo {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, #ffffff, #c8f7e3 40%, #8de9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            color: rgba(16, 185, 129, 0.85);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2.2px;
            opacity: 0.8;
        }

        .step-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 0.6rem;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.55);
        }

        .link-btn {
            background: none;
            border: none;
            color: #22d3ee;
            cursor: pointer;
            font-size: 0.78rem;
            padding: 0;
        }

        /* INPUTS */
        .input-group {
            margin-bottom: 0.75rem;
            text-align: left;
        }

        .input-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 6px;
            display: block;
            font-family: 'JetBrains Mono', monospace;
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.16);
            padding: 12px 14px;
            border-radius: 14px;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.92rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-field:focus {
            border-color: rgba(16, 185, 129, 0.8);
            background: rgba(16, 185, 129, 0.06);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.12);
        }

        /* ACTION BUTTON */
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #22d3ee);
            color: #00120f;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 12px 30px rgba(16, 185, 129, 0.25);
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #0ea5e9, #22c55e);
            transform: translateY(-2px);
            box-shadow: 0 16px 36px rgba(16, 185, 129, 0.35);
        }

        /* SOCIAL LOGIN */
        .social-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1.6rem 0 1.2rem;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.72rem;
        }

        .social-divider::before,
        .social-divider::after {
            content: "";
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            flex: 1;
            margin: 0 10px;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .social-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 15px;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .success-msg {
            color: #10b981;
            font-size: 0.8rem;
            margin-top: 15px;
            background: rgba(16, 185, 129, 0.1);
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        /* TOP LOGO */
        .top-logo {
            position: absolute;
            top: 2rem;
            left: 2.5rem;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            z-index: 100;
            transition: color 0.3s ease;
            text-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .top-logo:hover {
            color: #22d3ee;
        }

        .subtle-hint {
            margin-top: 0.9rem;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.46);
            letter-spacing: 0.2px;
            line-height: 1.3;
        }

        .subtle-hint.pill {
            text-align: center;
            margin-top: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            background: rgba(255, 255, 255, 0.025);
        }

        .terms-check {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 0.6rem 0 0.2rem;
            text-align: left;
            font-size: 0.74rem;
            color: rgba(255, 255, 255, 0.68);
        }

        .terms-check input[type="checkbox"] {
            margin-top: 2px;
            width: 16px;
            height: 16px;
            accent-color: #10b981;
        }

        .terms-check a {
            color: #22d3ee;
            text-decoration: none;
        }

        .terms-check a:hover {
            text-decoration: underline;
        }

        .card-inner {
            position: relative;
            z-index: 2;
        }
    </style>
</head>

<body>
    <!-- TOP LOGO -->
    <a href="index.html" class="top-logo">Anmar Enterprises</a>

    <!-- BACKGROUNDS -->
    <div class="video-background"><iframe
            src="https://www.youtube.com/embed/Uc1NI4COG9k?autoplay=1&mute=1&loop=1&playlist=Uc1NI4COG9k&controls=0&showinfo=0&rel=0&iv_load_policy=3&disablekb=1&modestbranding=1&start=120"
            title="Background" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
    <div class="green-tint"></div>
    <div class="scanlines"></div>
    <canvas id="gravityCanvas"
        style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-40; pointer-events:none;"></canvas>

    <!-- CARD -->
    <div class="login-card">
        <div class="card-inner">
            <div class="brand-logo">Anmar Enterprises</div>
            <div class="brand-subtitle">Portal de Acceso Seguro</div>

            <div class="subtle-hint pill" style="margin-bottom:12px;">
                Accede o crea tu cuenta en un solo paso.
            </div>

            <!-- STEP 1: EMAIL -->
            <div id="emailStep">
                <div class="input-group">
                    <label class="input-label">EMAIL CORPORATIVO</label>
                    <input type="email" id="email" class="input-field" placeholder="user@anmarenterprices.com" required>
                </div>
                <button type="button" class="login-btn" id="continueBtn">
                    <i class="fas fa-arrow-right"></i> Continuar
                </button>
                <div class="subtle-hint">Escribe tu correo y detectamos tu cuenta automáticamente.</div>
            </div>

            <!-- STEP 2: DETAILS -->
            <form id="authForm" onsubmit="handleAuth(event)" style="display:none;">
                <div class="input-group" id="nameGroup" style="display:none;">
                    <label class="input-label">NOMBRE COMPLETO</label>
                    <input type="text" id="name" class="input-field" placeholder="John Doe">
                </div>

                <div class="input-group">
                    <label class="input-label">ACCESS KEY</label>
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn" id="submitBtn">
                    <i class="fas fa-fingerprint"></i> <span id="btnText">Acceder</span>
                </button>
                <div class="step-row">
                    <span id="authHint">Usaremos este correo para continuar.</span>
                    <button type="button" class="link-btn" id="changeEmailBtn">Cambiar correo</button>
                </div>
            </form>

            <div class="terms-check" id="termsGroup">
                <input type="checkbox" id="termsAccepted">
                <label for="termsAccepted">
                    Acepto los <a href="terms.html" target="_blank" rel="noopener">Términos y Condiciones</a> de
                    Anmar Enterprises.
                </label>
            </div>

            <div id="statusMsg" class="error-msg"></div>

            <!-- SOCIAL -->
            <div class="social-divider">O continuar con</div>
            <div class="social-buttons">
                <!-- Integración Real de Google Identity Services -->
                <div id="g_id_onload"
                    data-client_id="676077959478-uo9f6h70osjmaeklm17ktithkualc4p3.apps.googleusercontent.com"
                    data-context="signin" data-ux_mode="popup" data-callback="handleGoogleLogin"
                    data-auto_prompt="false">
                </div>
                <div style="width: 100%; display: flex; justify-content: center;">
                    <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_black"
                        data-text="continue_with" data-size="large" data-logo_alignment="center" data-width="280">
                    </div>
                </div>
            </div>

            <div style="margin-top: 2rem; font-size: 0.7rem; color: rgba(255,255,255,0.3);">
                © 2026 anmarenterprices.com. Secure Gateway v2.4
            </div>
        </div>
    </div>

    <script>
        // --- AUTH LOGIC ---
        let mode = 'login'; // 'login' or 'register'
        const API_URL = '/api'; // Ensure this matches running port
        const urlParams = new URLSearchParams(window.location.search);
        const emailStep = document.getElementById('emailStep');
        const continueBtn = document.getElementById('continueBtn');
        const authForm = document.getElementById('authForm');
        const nameGroup = document.getElementById('nameGroup');
        const termsGroup = document.getElementById('termsGroup');
        const authHint = document.getElementById('authHint');
        const changeEmailBtn = document.getElementById('changeEmailBtn');

        // Keep session sticky: if already logged-in, skip login page.
        if (!urlParams.has('fresh')) {
            try {
                const storedUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
                if (storedUser && storedUser.email) {
                    window.location.replace('dashboard.html');
                }
            } catch (_) {
                localStorage.removeItem('currentUser');
            }
        }

        function setMode(nextMode) {
            mode = nextMode;
            const nameInput = document.getElementById('name');
            const termsAccepted = document.getElementById('termsAccepted');
            if (nameGroup && nameInput) {
                nameGroup.style.display = mode === 'register' ? 'block' : 'none';
                nameInput.required = mode === 'register';
            }
            if (termsGroup && termsAccepted) {
                termsAccepted.required = mode === 'register';
                if (mode !== 'register') termsAccepted.checked = false;
            }
            document.getElementById('btnText').textContent = mode === 'register' ? 'Crear Cuenta' : 'Acceder';
            if (authHint) {
                authHint.textContent = mode === 'register'
                    ? 'Crea tu cuenta con este correo.'
                    : 'Ingresa tu contraseña para continuar.';
            }
        }

        function setStep(step) {
            if (emailStep) emailStep.style.display = step === 'email' ? 'block' : 'none';
            if (authForm) authForm.style.display = step === 'details' ? 'block' : 'none';
            showStatus('', '');
        }

        async function checkEmail() {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showStatus('Escribe tu correo para continuar.', 'error');
                return;
            }
            if (!continueBtn) return;
            continueBtn.disabled = true;
            continueBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
            try {
                const res = await fetch(API_URL + '/check-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'No se pudo verificar el correo');
                setMode(data.exists ? 'login' : 'register');
                setStep('details');
            } catch (err) {
                showStatus(err.message || 'Error verificando el correo.', 'error');
            } finally {
                continueBtn.disabled = false;
                continueBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Continuar';
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const termsAccepted = document.getElementById('termsAccepted')?.checked;
            const btn = document.getElementById('submitBtn');

            // UI Loading
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
            showStatus('', '');

            try {
                let endpoint = mode === 'register' ? '/register' : '/login';
                let payload = { email, password };
                if (mode === 'register') {
                    if (!termsAccepted) {
                        showStatus('Debes aceptar los Términos y Condiciones.', 'error');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-fingerprint"></i> <span id="btnText">Crear Cuenta</span>';
                        return;
                    }
                    payload.name = name;
                    payload.termsAccepted = termsAccepted;
                }

                const res = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (res.ok) {
                    // SUCCESS
                    showStatus(data.message, 'success');

                    // SAVE USER SESSION
                    if (data.user) {
                        localStorage.setItem('currentUser', JSON.stringify(data.user));
                    }

                    btn.innerHTML = '<i class="fas fa-check"></i> Éxito';
                    btn.style.background = '#10b981';

                    if (mode === 'login') {
                        setTimeout(() => window.location.href = 'dashboard.html', 1000);
                    } else {
                        setTimeout(() => {
                            setMode('login');
                            setStep('details');
                            document.getElementById('email').value = email;
                            btn.disabled = false;
                        }, 1500);
                    }

                } else {
                    // ERROR
                    showStatus(data.error || "Error desconocido", 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-fingerprint"></i> <span id="btnText">' + (mode === 'register' ? 'Crear Cuenta' : 'Acceder') + '</span>';
                }

            } catch (err) {
                console.error(err);
                showStatus("Error de conexión con el servidor. Verifica que el puerto 5001 esté activo.", 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-redo"></i> Reintentar';
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.style.display = msg ? 'block' : 'none';
            el.className = type === 'success' ? 'success-msg' : 'error-msg';
        }

        async function processSocialLogin(provider, externalEmail = null, externalName = null, idToken = null) {
            // Simulador de datos para Apple. Para Google, exigimos datos reales.
            if (provider === 'Google' && !idToken) {
                showStatus("Fallo al autenticar tu cuenta de Google. Inténtalo de nuevo.", 'error');
                return;
            }

            const name = externalName || `${provider} User`;
            const email = externalEmail || `${provider.toLowerCase()}@anmarenterprices.com`;
            const termsAccepted = document.getElementById('termsAccepted')?.checked;

            const btn = document.getElementById('submitBtn');
            const el = document.getElementById('statusMsg');
            el.style.display = 'block';
            el.className = 'success-msg';
            el.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Conectando de forma segura con ${provider}...`;

            try {
                if (!termsAccepted) {
                    showStatus('Debes aceptar los Términos para crear cuenta con Google.', 'error');
                    return;
                }
                let bodyData = { provider };
                if (idToken) {
                    bodyData.token = idToken;
                } else {
                    bodyData.email = email;
                    bodyData.name = name;
                }
                bodyData.termsAccepted = termsAccepted;

                const res = await fetch(API_URL + '/social-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });

                const data = await res.json();

                if (res.ok) {
                    el.innerHTML = `<i class="fas fa-check"></i> ${data.message}. Entrando al Dashboard...`;
                    if (data.user) {
                        localStorage.setItem('currentUser', JSON.stringify(data.user));
                    }
                    setTimeout(() => window.location.href = 'dashboard.html', 1200);
                } else {
                    showStatus(data.error || "Error al conectar red social", 'error');
                }
            } catch (err) {
                console.error(err);
                showStatus(`Error conectando con ${provider}. Verifica conexión.`, 'error');
            }
        }

        function handleGoogleLogin(response) {
            // Esta función se llama automáticamente después del login de Google en la ventana emergente
            console.log("Autenticación exitosa en frontend, enviando Token al servidor...");

            // Ahora enviamos directamente el ID Token (la credencial) al backend para ser verificado oficialmente
            processSocialLogin('Google', null, null, response.credential);
        }

        if (continueBtn) {
            continueBtn.addEventListener('click', checkEmail);
        }
        const emailInput = document.getElementById('email');
        if (emailInput) {
            emailInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    checkEmail();
                }
            });
        }
        if (changeEmailBtn) {
            changeEmailBtn.addEventListener('click', () => {
                setStep('email');
                if (emailInput) emailInput.focus();
            });
        }

        setStep('email');

        // --- PARTICLES SCRIPT (Shared) ---
        const canvas = document.getElementById('gravityCanvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let mouse = { x: null, y: null, radius: (canvas.height / 80) * (canvas.width / 80) }
        window.addEventListener('mousemove', function (event) { mouse.x = event.x; mouse.y = event.y; });
        window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; mouse.radius = ((canvas.height / 80) * (canvas.height / 80)); init(); });
        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x; this.y = y; this.directionX = directionX; this.directionY = directionY; this.size = size; this.color = color;
            }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false); ctx.fillStyle = this.color; ctx.fill(); }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;
                let dx = mouse.x - this.x; let dy = mouse.y - this.y; let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius + this.size) {
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 3;
                    if (mouse.x > this.x && this.x > this.size * 10) this.x -= 3;
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 3;
                    if (mouse.y > this.y && this.y > this.size * 10) this.y -= 3;
                }
                this.x += this.directionX; this.y += this.directionY; this.draw();
            }
        }
        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 0.5) - 0.25;
                let directionY = (Math.random() * 0.5) - 0.25;
                particlesArray.push(new Particle(x, y, directionX, directionY, size, '#ffffff'));
            }
        }
        function animate() { requestAnimationFrame(animate); ctx.clearRect(0, 0, innerWidth, innerHeight); for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); } connect(); }
        function connect() { let opacityValue = 1; for (let a = 0; a < particlesArray.length; a++) { for (let b = a; b < particlesArray.length; b++) { let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y)); if (distance < (canvas.width / 7) * (canvas.height / 7)) { opacityValue = 1 - (distance / 20000); ctx.strokeStyle = 'rgba(255, 255, 255,' + opacityValue * 0.15 + ')'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke(); } } } }
        init(); animate();
    </script>
