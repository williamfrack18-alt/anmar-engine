<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANMAR Internal Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --bg: #000;
      --panel: rgba(6, 6, 6, 0.68);
      --panel-2: rgba(6, 6, 6, 0.78);
      --panel-3: rgba(6, 6, 6, 0.88);
      --border: rgba(255, 255, 255, 0.12);
      --text: #e5e7eb;
      --muted: rgba(255, 255, 255, 0.55);
      --accent: #10b981;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 18px;
      --shadow: 0 18px 46px rgba(0,0,0,0.55);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -100;
      pointer-events: none;
      overflow: hidden;
    }

    .video-background iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 100vh;
      transform: translate(-50%, -50%) scale(1.5);
      pointer-events: none;
      opacity: 0.5;
    }

    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.2) 50%, rgba(0, 0, 0, 0.2));
      background-size: 100% 4px;
      z-index: -50;
      pointer-events: none;
    }

    .green-tint {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 20, 10, 0.5);
      z-index: -51;
      pointer-events: none;
    }
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 12px;
      padding: 12px;
      height: 100vh;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 0;
      overflow: hidden;
      backdrop-filter: blur(24px);
    }
    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .brand {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(16,185,129,0.18), transparent);
    }
    .brand h1 {
      font-size: 0.95rem;
      margin: 0;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .filters {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: grid;
      gap: 8px;
      background: var(--panel-2);
    }
    .filters input[type="text"] {
      font-size: 0.9rem;
    }
    select, input, textarea {
      width: 100%;
      background: var(--panel-3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
      outline: none;
    }
    .queue {
      flex: 1;
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .ticket {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      transition: 0.15s;
    }
    .ticket:hover { border-color: rgba(59,130,246,0.5); }
    .ticket.active { border-color: rgba(16,185,129,0.7); box-shadow: 0 0 0 1px rgba(16,185,129,0.25); }
    .ticket .meta {
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
    .ticket .title { font-weight: 700; margin: 6px 0; }
    .status-pill {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      text-transform: uppercase;
    }
    .status-pending { color: #fbbf24; border-color: rgba(251,191,36,0.4); }
    .status-developing { color: #60a5fa; border-color: rgba(96,165,250,0.4); }
    .status-completed { color: #34d399; border-color: rgba(52,211,153,0.4); }
    .status-blocked { color: #f87171; border-color: rgba(248,113,113,0.4); }
    .workspace {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 12px;
      height: 100%;
      padding: 12px;
    }
    .card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      min-height: 0;
    }
    .card h2 { margin: 0 0 10px 0; font-size: 0.95rem; }
    .muted { color: var(--muted); font-size: 0.82rem; }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .actions.wide {
      grid-template-columns: 1fr 1fr 1fr 1fr;
    }
    button {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      background: var(--panel-3);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary { background: #10b981; color: #001b12; }
    .btn-success { background: #10b981; color: #01261c; }
    .btn-warning { background: #f59e0b; color: #2b1600; }
    .chat {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 10px;
    }
    .chat-log {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.9rem;
    }
    .msg {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      max-width: 85%;
    }
    .msg.client { background: rgba(59,130,246,0.12); align-self: flex-start; }
    .msg.engineer { background: rgba(16,185,129,0.12); align-self: flex-end; }
    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .toolbar input { flex: 1 1 240px; }
    .btn-ghost { background: transparent; border: 1px dashed rgba(148,163,184,0.4); color: var(--muted); }
    .ai-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .suggestion {
      font-size: 0.74rem;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(59,130,246,0.08);
      cursor: pointer;
      color: var(--text);
    }
    .suggestion:hover { border-color: rgba(59,130,246,0.5); }
    .unread-pill {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(59,130,246,0.25);
      color: #bfdbfe;
      border: 1px solid rgba(59,130,246,0.35);
    }
    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-2);
    }
    .badge {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .row label {
      font-size: 0.74rem;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }
    .blueprint-box {
      margin-top: 10px;
      padding: 10px;
      border-radius: 12px;
      border: 1px dashed rgba(59,130,246,0.4);
      background: rgba(59,130,246,0.08);
      display: grid;
      gap: 8px;
    }
    .blueprint-box label {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .blueprint-box input,
    .blueprint-box textarea {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 0.85rem;
    }
    .blueprint-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="video-background">
    <iframe
      src="https://www.youtube.com/embed/Uc1NI4COG9k?autoplay=1&mute=1&loop=1&playlist=Uc1NI4COG9k&controls=0&showinfo=0&rel=0&iv_load_policy=3&disablekb=1&modestbranding=1&start=120"
      title="Anmar Background" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
  <div class="green-tint"></div>
  <div class="scanlines"></div>

  <div class="app">
    <aside class="panel sidebar">
      <div class="brand">
        <h1>ANMAR Internal</h1>
        <span class="muted" id="queueMeta">Queue 0</span>
      </div>
      <div class="filters">
        <select id="engineerSelect">
          <option>William</option>
          <option>Julián</option>
          <option>George</option>
          <option>Marketing</option>
        </select>
        <select id="modeFilter">
          <option value="all">Todas</option>
          <option value="mine">Solo mías</option>
        </select>
        <select id="statusFilter">
          <option value="all">Todos</option>
          <option value="pending">Pendientes</option>
          <option value="developing">En progreso</option>
          <option value="completed">Listos</option>
          <option value="blocked">Bloqueados</option>
        </select>
        <select id="priorityFilter">
          <option value="all">Todas prioridades</option>
          <option value="high">Alta</option>
          <option value="medium">Media</option>
          <option value="low">Baja</option>
        </select>
        <input id="searchInput" type="text" placeholder="Buscar proyecto o cliente..." />
      </div>
      <div class="queue" id="queue"></div>
    </aside>

    <main class="panel">
      <div class="topline">
        <div style="font-weight:700;">Operaciones</div>
        <div class="badge" id="activeOrderBadge">Sin orden activa</div>
      </div>
      <div class="workspace">
        <section class="card" id="orderCard">
          <h2>Orden</h2>
          <div class="muted">Selecciona una orden para ver detalles.</div>
        </section>
        <section class="card">
          <h2>Chat con Cliente</h2>
          <div class="chat">
            <div class="chat-log" id="chatLog">
              <div class="muted">Sin mensajes.</div>
            </div>
            <div class="toolbar">
              <input id="chatInput" type="text" placeholder="Escribe al cliente..." />
              <button id="sendBtn" class="btn-primary">Enviar</button>
              <button id="aiSuggestBtn" class="btn-ghost">IA sugerir</button>
            </div>
            <div class="ai-suggestions" id="aiSuggestions"></div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    let currentEngineer = 'William';
    let currentStatus = 'all';
    let currentMode = 'all';
    let currentPriority = 'all';
    let currentOrder = null;
    let lastChatCount = 0;
    let chatInterval = null;
    let lastQueue = [];
    let lastUnreadTotal = 0;
    let currentChatHistory = [];
    const notifyAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

    const queueEl = document.getElementById('queue');
    const orderCard = document.getElementById('orderCard');
    const chatLog = document.getElementById('chatLog');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const aiSuggestBtn = document.getElementById('aiSuggestBtn');
    const aiSuggestions = document.getElementById('aiSuggestions');
    const queueMeta = document.getElementById('queueMeta');
    const searchInput = document.getElementById('searchInput');
    const activeOrderBadge = document.getElementById('activeOrderBadge');
    const modeFilter = document.getElementById('modeFilter');
    const priorityFilter = document.getElementById('priorityFilter');

    document.getElementById('engineerSelect').addEventListener('change', (e) => {
      currentEngineer = e.target.value;
      fetchQueue();
    });
    document.getElementById('statusFilter').addEventListener('change', (e) => {
      currentStatus = e.target.value;
      fetchQueue();
    });
    modeFilter.addEventListener('change', (e) => {
      currentMode = e.target.value;
      fetchQueue();
    });
    priorityFilter.addEventListener('change', (e) => {
      currentPriority = e.target.value;
      fetchQueue();
    });
    searchInput.addEventListener('input', () => {
      renderQueue(lastQueue);
    });

    function statusClass(status) {
      const s = String(status || 'pending').toLowerCase();
      if (s === 'developing') return 'status-developing';
      if (s === 'completed') return 'status-completed';
      if (s === 'blocked') return 'status-blocked';
      return 'status-pending';
    }

    async function fetchQueue() {
      const q = new URLSearchParams({
        engineer: currentEngineer,
        mode: currentMode,
        status: currentStatus,
        priority: currentPriority
      });
      const res = await fetch(`/api/internal-queue?${q.toString()}`);
      const data = await res.json();
      const items = data.items || [];
      lastQueue = items;
      const unreadTotal = items.reduce((sum, item) => sum + (parseInt(item.unread_messages || 0, 10) || 0), 0);
      queueMeta.textContent = unreadTotal ? `Queue ${items.length} • ${unreadTotal} nuevos` : `Queue ${items.length}`;
      if (unreadTotal > lastUnreadTotal) {
        notifyAudio.play().catch(() => {});
      }
      lastUnreadTotal = unreadTotal;
      renderQueue(items);
    }

    function renderQueue(items) {
      const q = (searchInput.value || '').trim().toLowerCase();
      const filtered = q
        ? items.filter(i => `${i.project_name || ''} ${i.client_email || i.client || ''}`.toLowerCase().includes(q))
        : items;
      queueEl.innerHTML = '';
      if (!filtered.length) {
        queueEl.innerHTML = '<div class="muted" style="padding:10px;">Sin órdenes.</div>';
        return;
      }
      filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = 'ticket' + (currentOrder && currentOrder.id === item.id ? ' active' : '');
        div.onclick = () => loadOrder(item);
        const hasUnread = item.unread_messages;
        const unreadCount = parseInt(item.unread_messages || 0, 10) || 0;
        div.innerHTML = `
          <div class="meta"><span>${item.id || 'TKT'}</span><span>${(item.updated_at || '').slice(11,16)}</span></div>
          <div class="title">${item.project_name || 'Sin nombre'}</div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="status-pill ${statusClass(item.status)}">${item.status || 'pending'}</span>
            <span class="muted">${item.client_email || item.client || ''}</span>
          </div>
          ${unreadCount ? `<div style="margin-top:6px;"><span class="unread-pill">${unreadCount} nuevo${unreadCount > 1 ? 's' : ''}</span></div>` : ''}
        `;
        if (hasUnread && (!currentOrder || currentOrder.id !== item.id)) {
          div.style.borderColor = 'rgba(59,130,246,0.7)';
          div.style.boxShadow = '0 0 0 1px rgba(59,130,246,0.25)';
        }
        queueEl.appendChild(div);
      });
    }

    function loadOrder(item) {
      currentOrder = item;
      lastChatCount = 0;
      currentChatHistory = [];
      aiSuggestions.innerHTML = '';
      chatInput.value = '';
      chatLog.innerHTML = '<div class="muted">Cargando mensajes...</div>';
      activeOrderBadge.textContent = `${item.project_name || 'Orden'} • ${String(item.status || 'pending').toUpperCase()}`;
      const preview = item.preview_url || `/projects/${item.project_name}/index.html`;
      const note = item.delivery_note || '';
      const internalNotes = item.internal_notes || '';
      orderCard.innerHTML = `
        <h2>${item.project_name || 'Orden'}</h2>
        <div class="muted">Cliente: ${item.client_email || item.client || 'N/D'}</div>
        <div class="muted">Estado: ${item.status || 'pending'}</div>
        <div style="margin:10px 0; font-size:0.9rem;">${item.summary || 'Sin resumen'}</div>
        <div class="row">
          <div>
            <label>Preview URL</label>
            <input id="previewUrlInput" type="text" value="${preview}" />
          </div>
          <div>
            <label>Nota de entrega</label>
            <textarea id="deliveryNoteInput" rows="3">${note}</textarea>
          </div>
        </div>
        <div style="margin-top:8px;">
          <label>Notas internas</label>
          <textarea id="internalNotesInput" rows="3" placeholder="Notas internas (solo equipo)">${internalNotes}</textarea>
        </div>
        <div class="blueprint-box">
          <div style="font-weight:700; font-size:0.78rem; letter-spacing:0.6px; text-transform:uppercase;">Blueprint</div>
          <div>
            <label>Título</label>
            <input id="bpTitle" type="text" placeholder="Ej: MVP + flujo de reservas" />
          </div>
          <div>
            <label>Resumen</label>
            <textarea id="bpSummary" rows="3" placeholder="Resumen claro de lo que se va a construir y cambiar."></textarea>
          </div>
          <div class="row">
            <div>
              <label>Alcance / pasos (1 por línea)</label>
              <textarea id="bpSteps" rows="4" placeholder="Landing + formulario&#10;Panel de admin básico&#10;Integración pagos"></textarea>
            </div>
            <div>
              <label>Entregables (1 por línea)</label>
              <textarea id="bpDeliverables" rows="4" placeholder="Figma + Preview&#10;MVP desplegado&#10;Reporte de métricas"></textarea>
            </div>
          </div>
          <div class="blueprint-actions">
            <button class="btn-primary" onclick="sendBlueprint()">Enviar blueprint al cliente</button>
          </div>
        </div>
        <div class="actions wide" style="margin-top:10px;">
          <button class="btn-primary" onclick="takeOrder('${item.id}')">Tomar orden</button>
          <button onclick="saveProgress('${item.id}')">Guardar avance</button>
          <button onclick="setStatus('${item.id}','developing')">En progreso</button>
          <button class="btn-warning" onclick="setStatus('${item.id}','blocked')">Bloquear</button>
          <button class="btn-success" onclick="setStatus('${item.id}','completed')">Entregar</button>
        </div>
        <div class="actions" style="margin-top:8px;">
          <button onclick="saveNotes('${item.id}')">Guardar nota</button>
          <button onclick="openPreview('${item.project_name}')">Abrir preview</button>
          <button onclick="copyPath('${item.project_name}')">Copiar ruta</button>
        </div>
      `;
      loadChat();
      if (chatInterval) clearInterval(chatInterval);
      chatInterval = setInterval(loadChat, 3000);
    }

    async function takeOrder(id) {
      await fetch('/api/accept-ticket', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticket_id: id, engineer: currentEngineer })
      });
      fetchQueue();
    }

    async function setStatus(id, status) {
      const previewUrl = (document.getElementById('previewUrlInput')?.value || '').trim();
      const deliveryNote = (document.getElementById('deliveryNoteInput')?.value || '').trim();
      const internalNotes = (document.getElementById('internalNotesInput')?.value || '').trim();
      await fetch('/api/admin/update-ticket', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticket_id: id, engineer: currentEngineer, status, preview_url: previewUrl, delivery_note: deliveryNote, internal_notes: internalNotes })
      });
      fetchQueue();
    }

    async function saveProgress(id) {
      const previewUrl = (document.getElementById('previewUrlInput')?.value || '').trim();
      const deliveryNote = (document.getElementById('deliveryNoteInput')?.value || '').trim();
      const internalNotes = (document.getElementById('internalNotesInput')?.value || '').trim();
      await fetch('/api/admin/update-ticket', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticket_id: id, engineer: currentEngineer, status: 'developing', preview_url: previewUrl, delivery_note: deliveryNote, internal_notes: internalNotes })
      });
      fetchQueue();
    }

    async function saveNotes(id) {
      const previewUrl = (document.getElementById('previewUrlInput')?.value || '').trim();
      const deliveryNote = (document.getElementById('deliveryNoteInput')?.value || '').trim();
      const internalNotes = (document.getElementById('internalNotesInput')?.value || '').trim();
      await fetch('/api/admin/update-ticket', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticket_id: id, engineer: currentEngineer, preview_url: previewUrl, delivery_note: deliveryNote, internal_notes: internalNotes })
      });
      fetchQueue();
    }

    function parseLines(value) {
      return String(value || '')
        .split('\n')
        .map(line => line.trim())
        .filter(Boolean);
    }

    async function sendBlueprint() {
      if (!currentOrder) return;
      const title = (document.getElementById('bpTitle')?.value || '').trim();
      const summary = (document.getElementById('bpSummary')?.value || '').trim();
      const steps = parseLines(document.getElementById('bpSteps')?.value || '');
      const deliverables = parseLines(document.getElementById('bpDeliverables')?.value || '');
      const payload = {
        title: title || `Blueprint ${currentOrder.project_name || ''}`.trim(),
        summary,
        steps,
        deliverables
      };
      await fetch('/api/human-chat/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          project_name: currentOrder.project_name,
          role: 'human',
          content: summary || payload.title,
          actor: currentEngineer,
          kind: 'blueprint',
          payload
        })
      });
      const fields = ['bpTitle','bpSummary','bpSteps','bpDeliverables'];
      fields.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      loadChat();
    }

    async function loadChat() {
      if (!currentOrder) return;
      const res = await fetch(`/api/human-chat/history?project_name=${encodeURIComponent(currentOrder.project_name)}&mark_read=1`);
      const data = await res.json();
      const history = data.history || [];
      currentChatHistory = history;
      if (history.length === 0) {
        chatLog.innerHTML = '<div class="muted">Sin mensajes.</div>';
        return;
      }
      if (history.length === lastChatCount) return;
      if (lastChatCount > 0 && history.length > lastChatCount) {
        notifyAudio.play().catch(() => {});
      }
      lastChatCount = history.length;
      chatLog.innerHTML = history.map(msg => {
        const role = msg.role === 'client' ? 'client' : 'engineer';
        const name = msg.role === 'client' ? 'Cliente' : (msg.actor || currentEngineer);
        return `<div class="msg ${role}"><strong>${name}:</strong> ${msg.content}</div>`;
      }).join('');
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function openPreview(projectName) {
      const target = `/projects/${projectName}/index.html`;
      window.open(target, '_blank');
    }

    function copyPath(projectName) {
      const path = `/generated_projects/${projectName}`;
      navigator.clipboard.writeText(path).catch(() => {});
    }

    async function sendChat() {
      if (!currentOrder) return;
      const content = (chatInput.value || '').trim();
      if (!content) return;
      chatInput.value = '';
      aiSuggestions.innerHTML = '';
      await fetch('/api/human-chat/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          project_name: currentOrder.project_name,
          role: 'human',
          content,
          actor: currentEngineer
        })
      });
      loadChat();
    }

    function renderAiSuggestions(items) {
      if (!items || !items.length) {
        aiSuggestions.innerHTML = '';
        return;
      }
      aiSuggestions.innerHTML = '';
      items.forEach(text => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'suggestion';
        btn.textContent = text;
        btn.addEventListener('click', () => applySuggestion(text));
        aiSuggestions.appendChild(btn);
      });
    }

    function applySuggestion(text) {
      chatInput.value = text || '';
      chatInput.focus();
    }

    async function requestAiSuggestions() {
      if (!currentOrder) return;
      aiSuggestBtn.disabled = true;
      aiSuggestBtn.textContent = 'Generando...';
      try {
        const res = await fetch('/api/internal/ai-reply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            project_name: currentOrder.project_name,
            client_email: currentOrder.client_email || '',
            status: currentOrder.status || '',
            messages: currentChatHistory || []
          })
        });
        const data = await res.json();
        renderAiSuggestions(data.suggestions || []);
      } catch (e) {
        renderAiSuggestions([]);
      } finally {
        aiSuggestBtn.disabled = false;
        aiSuggestBtn.textContent = 'IA sugerir';
      }
    }

    sendBtn.addEventListener('click', sendChat);
    aiSuggestBtn.addEventListener('click', requestAiSuggestions);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendChat();
    });

    fetchQueue();
    setInterval(fetchQueue, 8000);
  </script>
</body>
</html>
