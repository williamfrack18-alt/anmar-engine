<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmar Enterprises | Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #070e0b;
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        /* ── NAVBAR ── */
        header {
            position: relative;
            z-index: 100;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.4rem 4vw;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(14px);
        }

        .nav-logo {
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -0.4px;
            color: #fff;
            text-decoration: none;
            white-space: nowrap;
            flex-shrink: 0;
        }

        header nav {
            display: flex;
            gap: 1.8rem;
        }

        header nav a {
            text-decoration: none;
            color: rgba(255,255,255,0.55);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.2px;
            transition: color 0.22s;
            white-space: nowrap;
        }

        header nav a:hover { color: #fff; }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-shrink: 0;
        }

        .nav-btn-login {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: color 0.22s;
        }
        .nav-btn-login:hover { color: #fff; }

        .nav-btn-start {
            background: #fff;
            color: #000;
            padding: 0.5rem 1.1rem;
            border-radius: 7px;
            font-weight: 700;
            font-size: 0.82rem;
            text-decoration: none;
            transition: transform 0.18s, box-shadow 0.18s;
            box-shadow: 0 6px 16px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        .nav-btn-start:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(0,0,0,0.35);
        }

        /* ── SPLIT WRAP ── */
        .split-wrap {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── LEFT PANEL ── */
        .split-left {
            width: 480px;
            flex-shrink: 0;
            background: #080e0b;
            border-right: 1px solid rgba(16,185,129,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 52px;
            position: relative;
            z-index: 20;
        }

        .form-wrap { width: 100%; max-width: 360px; }

        /* Logo mark */
        .brand-mark {
            width: 46px; height: 46px;
            border-radius: 12px;
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.2);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 28px;
            font-family: 'Inter', sans-serif;
            font-size: 19px; font-weight: 700;
            color: #10b981;
            letter-spacing: -0.5px;
        }

        /* Headline */
        .form-title {
            font-family: 'Inter', sans-serif;
            font-size: 1.75rem; font-weight: 500;
            color: #fff; letter-spacing: -0.6px;
            text-align: center; margin-bottom: 6px;
            line-height: 1.15;
        }
        .form-sub {
            font-size: 13.5px; font-weight: 400;
            color: rgba(255,255,255,0.35);
            text-align: center; margin-bottom: 30px;
            line-height: 1.55;
        }

        /* Divider */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 0 0 16px;
            color: rgba(255,255,255,0.18);
            font-size: 11px; letter-spacing: 0.7px; text-transform: uppercase;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px;
            background: rgba(255,255,255,0.07);
        }

        /* Email toggle button (shown before email input) */
        .email-toggle-btn {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 10px;
            padding: 13px 18px;
            color: rgba(255,255,255,0.75);
            font-family: 'Inter', sans-serif;
            font-size: 14px; font-weight: 500;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 9px;
            transition: background 0.18s, border-color 0.18s;
        }
        .email-toggle-btn:hover {
            background: rgba(255,255,255,0.07);
            border-color: rgba(255,255,255,0.15);
            color: #fff;
        }
        .email-toggle-btn i { font-size: 13px; opacity: 0.7; }

        /* Email input area (hidden until email-toggle clicked) */
        #emailInputArea { display: none; margin-top: 14px; }

        /* Inputs */
        .field { margin-bottom: 12px; }
        .field-label {
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.8px; text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            display: block; margin-bottom: 7px;
        }
        .field-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 9px;
            padding: 13px 15px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px; font-weight: 400;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .field-input::placeholder { color: rgba(255,255,255,0.18); }
        .field-input:focus {
            border-color: rgba(16,185,129,0.45);
            background: rgba(16,185,129,0.03);
        }

        /* Primary CTA */
        .cta-btn {
            width: 100%;
            background: #0d1f16;
            border: 1px solid rgba(16,185,129,0.18);
            border-radius: 9px;
            padding: 13px 20px;
            color: rgba(255,255,255,0.88);
            font-family: 'Inter', sans-serif;
            font-size: 14px; font-weight: 600;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.18s, border-color 0.18s, transform 0.12s;
            margin-top: 2px;
            letter-spacing: 0.1px;
        }
        .cta-btn:hover {
            background: #122a1c;
            border-color: rgba(16,185,129,0.35);
            transform: translateY(-1px);
        }
        .cta-btn:active { transform: translateY(0); }

        /* Step row */
        .step-row {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 12px; color: rgba(255,255,255,0.26);
        }
        .link-btn {
            background: none; border: none;
            color: rgba(16,185,129,0.7);
            cursor: pointer; font-family: 'Inter', sans-serif;
            font-size: 12px; padding: 0;
            transition: color 0.2s;
        }
        .link-btn:hover { color: #10b981; }

        /* T&C */
        .terms-row {
            display: flex; align-items: flex-start; gap: 10px;
            margin-top: 16px;
            font-size: 11px; color: rgba(255,255,255,0.26);
            line-height: 1.55;
        }
        .terms-row input[type="checkbox"] {
            width: 14px; height: 14px;
            accent-color: #10b981;
            flex-shrink: 0; margin-top: 1px;
        }
        .terms-row a { color: rgba(16,185,129,0.65); text-decoration: none; }
        .terms-row a:hover { color: #10b981; }

        /* Status */
        .error-msg {
            color: #fca5a5; font-size: 12px;
            margin-top: 12px; background: rgba(239,68,68,0.07);
            padding: 10px 12px; border-radius: 8px; display: none;
            border: 1px solid rgba(239,68,68,0.14);
        }
        .success-msg {
            color: #6ee7b7; font-size: 12px;
            margin-top: 12px; background: rgba(6,78,59,0.18);
            padding: 10px 12px; border-radius: 8px; display: none;
            border: 1px solid rgba(16,185,129,0.18);
        }

        /* Footer */
        .left-footer {
            position: absolute; bottom: 22px; left: 0; right: 0;
            text-align: center;
            font-size: 10px; color: rgba(255,255,255,0.13);
        }

        /* ── RIGHT PANEL ── */
        .split-right {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #030806;
        }

        /* Video bg */
        .right-video {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; pointer-events: none; overflow: hidden;
        }
        .right-video iframe {
            position: absolute; top: 50%; left: 50%;
            width: 180%; height: 180%;
            transform: translate(-50%, -50%);
            pointer-events: none; opacity: 0.5;
        }

        /* Particle canvas */
        #rightCanvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* Dark overlay */
        .right-overlay {
            position: absolute; inset: 0; z-index: 2;
            background: linear-gradient(135deg,
                rgba(2,8,5,0.5) 0%,
                rgba(3,12,8,0.28) 50%,
                rgba(2,8,5,0.55) 100%);
        }

        /* Right content — only the headline */
        .right-content {
            position: absolute; inset: 0; z-index: 3;
            display: flex; flex-direction: column;
            align-items: flex-start; justify-content: center;
            padding: 0 8vw;
        }

        .right-headline {
            font-family: 'Inter', sans-serif;
            font-size: clamp(2.6rem, 6vw, 4.8rem);
            font-weight: 500;
            color: #fff;
            line-height: 1.07;
            letter-spacing: -2px;
            max-width: 860px;
        }
        .right-headline .hl-muted { color: rgba(255,255,255,0.65); }

        /* Mobile */
        @media (max-width: 768px) {
            header nav { display: none; }
            .split-wrap { flex-direction: column; }
            .split-left {
                width: 100%; border-right: none;
                border-bottom: 1px solid rgba(16,185,129,0.08);
                padding: 36px 24px;
                justify-content: flex-start;
                padding-top: 48px;
            }
            .split-right { display: none; }
        }
    </style>
</head>
<body>

<!-- ── NAVBAR ── -->
<header>
    <a href="index.html" class="nav-logo">Anmar Enterprises</a>

    <nav>
        <a href="index.html">Home</a>
        <a href="index.html#genesis">Build</a>
        <a href="index.html#impulso">Growth</a>
        <a href="index.html#escala">Capital</a>
        <a href="pricing.html">Pricing</a>
        <a href="index.html#faq">FAQ</a>
    </nav>

    <div class="nav-actions">
        <a href="login.html" class="nav-btn-login">
            <i class="fas fa-arrow-right-to-bracket"></i> Log In
        </a>
        <a href="login.html" class="nav-btn-start">Get Started</a>
    </div>
</header>

<!-- ── SPLIT PANELS ── -->
<div class="split-wrap">

    <!-- LEFT: FORM -->
    <div class="split-left">
        <div class="form-wrap">

            <!-- Headline -->
            <div class="form-title">Welcome back.</div>
            <div class="form-sub">Sign in to continue building your future</div>

            <!-- T&C (moved above Google button) -->
            <div class="terms-row" id="termsGroup" style="margin-top:0; margin-bottom:16px;">
                <input type="checkbox" id="termsAccepted">
                <label for="termsAccepted">
                    I agree to the <a href="terms.html" target="_blank" rel="noopener">Terms & Conditions</a> of Anmar Enterprises.
                </label>
            </div>

            <!-- Google GIS -->
            <div id="g_id_onload"
                data-client_id="676077959478-uo9f6h70osjmaeklm17ktithkualc4p3.apps.googleusercontent.com"
                data-context="signin" data-ux_mode="popup"
                data-callback="handleGoogleLogin" data-auto_prompt="false">
            </div>
            <div style="width:100%; display:flex; justify-content:center; margin-bottom:16px; position:relative;">
                <div class="g_id_signin" data-type="standard" data-shape="rectangular"
                    data-theme="filled_black" data-text="continue_with"
                    data-size="large" data-logo_alignment="center" data-width="360">
                </div>
                <!-- Blocker overlay when terms not accepted -->
                <div id="googleBlocker" onclick="handleGoogleBlockerClick()" style="position:absolute;inset:0;cursor:pointer;z-index:10;"></div>
            </div>

            <div class="divider">or</div>

            <!-- Email toggle button (shown first) -->
            <div id="emailToggleWrap">
                <button type="button" class="email-toggle-btn" id="emailToggleBtn">
                    <i class="fas fa-envelope"></i> Continue with email
                </button>
            </div>

            <!-- Email input area (hidden until toggle clicked) -->
            <div id="emailInputArea">
                <!-- Step 1: Email -->
                <div id="emailStep">
                    <div class="field">
                        <label class="field-label">Email</label>
                        <input type="email" id="email" class="field-input" placeholder="you@example.com" required>
                    </div>
                    <button type="button" class="cta-btn" id="continueBtn">
                        Continue <i class="fas fa-arrow-right" style="font-size:11px;"></i>
                    </button>
                </div>

                <!-- Step 2: Password / Name -->
                <form id="authForm" onsubmit="handleAuth(event)" style="display:none;">
                    <div class="field" id="nameGroup" style="display:none;">
                        <label class="field-label">Full Name</label>
                        <input type="text" id="name" class="field-input" placeholder="John Doe">
                    </div>
                    <div class="field">
                        <label class="field-label">Password</label>
                        <input type="password" id="password" class="field-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="cta-btn" id="submitBtn">
                        <span id="btnText">Sign in</span>
                        <i class="fas fa-arrow-right" style="font-size:11px;"></i>
                    </button>
                    <div class="step-row">
                        <span id="authHint"></span>
                        <button type="button" class="link-btn" id="changeEmailBtn">Change email</button>
                    </div>
                </form>
            </div>

            <div id="statusMsg" class="error-msg"></div>
        </div>

        <div class="left-footer">© 2026 anmarenterprices.com</div>
    </div>

    <!-- RIGHT: VISUAL -->
    <div class="split-right">
        <!-- Video background -->
        <div class="right-video">
            <iframe src="https://www.youtube.com/embed/Uc1NI4COG9k?autoplay=1&mute=1&loop=1&playlist=Uc1NI4COG9k&controls=0&showinfo=0&rel=0&iv_load_policy=3&disablekb=1&modestbranding=1&start=120"
                frameborder="0" allow="autoplay; encrypted-media"></iframe>
        </div>

        <!-- Neural particles -->
        <canvas id="rightCanvas"></canvas>

        <!-- Overlay -->
        <div class="right-overlay"></div>

        <!-- Only the headline -->
        <div class="right-content">
            <div class="right-headline">
                Your idea.<br>
                <span class="hl-muted">Built. Launched. Funded.</span>
            </div>
        </div>
    </div>

</div><!-- end split-wrap -->

<script>
    // --- AUTH LOGIC ---
    let mode = 'login';
    const API_URL = '/api';
    const urlParams = new URLSearchParams(window.location.search);
    const emailStep     = document.getElementById('emailStep');
    const continueBtn   = document.getElementById('continueBtn');
    const authForm      = document.getElementById('authForm');
    const nameGroup     = document.getElementById('nameGroup');
    const termsGroup    = document.getElementById('termsGroup');
    const authHint      = document.getElementById('authHint');
    const changeEmailBtn = document.getElementById('changeEmailBtn');
    const emailToggleBtn = document.getElementById('emailToggleBtn');
    const emailInputArea = document.getElementById('emailInputArea');
    const emailToggleWrap = document.getElementById('emailToggleWrap');

    // Skip login if already authenticated
    if (!urlParams.has('fresh')) {
        try {
            const storedUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            if (storedUser && storedUser.email) window.location.replace('dashboard.html');
        } catch (_) { localStorage.removeItem('currentUser'); }
    }

    // Show email input area when button clicked
    if (emailToggleBtn) {
        emailToggleBtn.addEventListener('click', () => {
            emailToggleWrap.style.display = 'none';
            emailInputArea.style.display = 'block';
            setStep('email');
            const emailInput = document.getElementById('email');
            if (emailInput) setTimeout(() => emailInput.focus(), 50);
        });
    }

    function setMode(nextMode) {
        mode = nextMode;
        const nameInput     = document.getElementById('name');
        const termsAccepted = document.getElementById('termsAccepted');
        if (nameGroup && nameInput) {
            nameGroup.style.display = mode === 'register' ? 'block' : 'none';
            nameInput.required = mode === 'register';
        }
        if (termsGroup && termsAccepted) {
            termsAccepted.required = mode === 'register';
            if (mode !== 'register') termsAccepted.checked = false;
        }
        document.getElementById('btnText').textContent = mode === 'register' ? 'Create Account' : 'Sign in';
        if (authHint) {
            authHint.textContent = mode === 'register'
                ? 'Create your account with this email.'
                : 'Enter your password to continue.';
        }
    }

    function setStep(step) {
        if (emailStep) emailStep.style.display = step === 'email' ? 'block' : 'none';
        if (authForm)  authForm.style.display  = step === 'details' ? 'block' : 'none';
        showStatus('', '');
    }

    async function checkEmail() {
        const email = document.getElementById('email').value.trim();
        if (!email) { showStatus('Enter your email to continue.', 'error'); return; }
        if (!continueBtn) return;
        continueBtn.disabled = true;
        continueBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';
        try {
            const res  = await fetch(API_URL + '/check-email', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Could not verify email');
            setMode(data.exists ? 'login' : 'register');
            setStep('details');
        } catch (err) {
            showStatus(err.message || 'Error verifying email.', 'error');
        } finally {
            continueBtn.disabled = false;
            continueBtn.innerHTML = 'Continue <i class="fas fa-arrow-right" style="font-size:11px;"></i>';
        }
    }

    async function handleAuth(e) {
        e.preventDefault();
        const email    = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const name     = document.getElementById('name').value;
        const termsAccepted = document.getElementById('termsAccepted')?.checked;
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        showStatus('', '');
        try {
            let endpoint = mode === 'register' ? '/register' : '/login';
            let payload  = { email, password };
            if (mode === 'register') {
                if (!termsAccepted) {
                    showStatus('You must accept the Terms & Conditions.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<span id="btnText">Create Account</span> <i class="fas fa-arrow-right" style="font-size:11px;"></i>';
                    return;
                }
                payload.name = name;
                payload.termsAccepted = termsAccepted;
            }
            const res  = await fetch(API_URL + endpoint, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (res.ok) {
                showStatus(data.message, 'success');
                if (data.user) localStorage.setItem('currentUser', JSON.stringify(data.user));
                btn.innerHTML = '<i class="fas fa-check"></i> Done';
                btn.style.background = '#0a2a1a';
                if (mode === 'login') setTimeout(() => window.location.href = 'dashboard.html', 900);
                else setTimeout(() => { setMode('login'); setStep('details'); document.getElementById('email').value = email; btn.disabled = false; }, 1500);
            } else {
                showStatus(data.error || 'Unknown error', 'error');
                btn.disabled = false;
                btn.innerHTML = '<span id="btnText">' + (mode === 'register' ? 'Create Account' : 'Sign in') + '</span> <i class="fas fa-arrow-right" style="font-size:11px;"></i>';
            }
        } catch (err) {
            showStatus('Connection error. Please try again.', 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-redo"></i> Retry';
        }
    }

    function showStatus(msg, type) {
        const el = document.getElementById('statusMsg');
        el.textContent = msg;
        el.style.display = msg ? 'block' : 'none';
        el.className = type === 'success' ? 'success-msg' : 'error-msg';
    }

    async function processSocialLogin(provider, externalEmail = null, externalName = null, idToken = null) {
        if (provider === 'Google' && !idToken) { showStatus('Google auth failed. Try again.', 'error'); return; }
        const termsAccepted = document.getElementById('termsAccepted')?.checked;
        const el = document.getElementById('statusMsg');
        el.style.display = 'block'; el.className = 'success-msg';
        el.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Connecting with ${provider}...`;
        try {
            if (!termsAccepted) { showStatus('You must accept the Terms to sign in with Google.', 'error'); return; }
            let bodyData = { provider };
            if (idToken) bodyData.token = idToken;
            else { bodyData.email = externalEmail; bodyData.name = externalName; }
            bodyData.termsAccepted = termsAccepted;
            const res  = await fetch(API_URL + '/social-login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyData)
            });
            const data = await res.json();
            if (res.ok) {
                el.innerHTML = `<i class="fas fa-check"></i> ${data.message}. Entering dashboard...`;
                if (data.user) localStorage.setItem('currentUser', JSON.stringify(data.user));
                setTimeout(() => window.location.href = 'dashboard.html', 1200);
            } else { showStatus(data.error || 'Social login error', 'error'); }
        } catch (err) { showStatus(`Error connecting with ${provider}.`, 'error'); }
    }

    function handleGoogleLogin(response) {
        processSocialLogin('Google', null, null, response.credential);
    }

    // Google blocker: hide overlay only when terms accepted
    const termsCheckbox = document.getElementById('termsAccepted');
    const googleBlocker = document.getElementById('googleBlocker');
    function updateGoogleBlocker() {
        if (googleBlocker) googleBlocker.style.display = termsCheckbox?.checked ? 'none' : 'block';
    }
    if (termsCheckbox) termsCheckbox.addEventListener('change', updateGoogleBlocker);
    updateGoogleBlocker();

    function handleGoogleBlockerClick() {
        showStatus('Please accept the Terms & Conditions first.', 'error');
        document.getElementById('termsAccepted').style.outline = '2px solid rgba(251,146,60,0.7)';
        setTimeout(() => { document.getElementById('termsAccepted').style.outline = ''; }, 2000);
    }

    if (continueBtn) continueBtn.addEventListener('click', checkEmail);
    const emailInput = document.getElementById('email');
    if (emailInput) emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); checkEmail(); } });
    if (changeEmailBtn) changeEmailBtn.addEventListener('click', () => {
        setStep('email');
        if (emailInput) emailInput.focus();
    });

    // --- RIGHT PANEL NEURAL PARTICLES ---
    const canvas = document.getElementById('rightCanvas');
    const ctx    = canvas.getContext('2d');
    const panel  = document.querySelector('.split-right');

    function resizeCanvas() {
        canvas.width  = panel.offsetWidth;
        canvas.height = panel.offsetHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });

    let particles = [];
    let mouse = { x: null, y: null };
    panel.addEventListener('mousemove', e => {
        const rect = panel.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });
    panel.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x  = Math.random() * canvas.width;
            this.y  = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.4;
            this.vy = (Math.random() - 0.5) * 0.4;
            this.r  = Math.random() * 1.8 + 0.6;
        }
        update() {
            if (mouse.x !== null) {
                const dx = mouse.x - this.x, dy = mouse.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 100) { this.vx -= dx / dist * 0.5; this.vy -= dy / dist * 0.5; }
            }
            this.vx *= 0.995; this.vy *= 0.995;
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width)  this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fill();
        }
    }

    function initParticles() {
        const count = Math.floor((canvas.width * canvas.height) / 8000);
        particles = Array.from({ length: count }, () => new Particle());
    }

    function drawConnections() {
        const maxDist = canvas.width * 0.18;
        for (let a = 0; a < particles.length; a++) {
            for (let b = a + 1; b < particles.length; b++) {
                const dx = particles[a].x - particles[b].x;
                const dy = particles[a].y - particles[b].y;
                const d  = Math.sqrt(dx*dx + dy*dy);
                if (d < maxDist) {
                    const op = (1 - d / maxDist) * 0.16;
                    ctx.strokeStyle = `rgba(255,255,255,${op})`;
                    ctx.lineWidth = 0.8;
                    ctx.beginPath();
                    ctx.moveTo(particles[a].x, particles[a].y);
                    ctx.lineTo(particles[b].x, particles[b].y);
                    ctx.stroke();
                }
            }
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        drawConnections();
    }

    initParticles();
    animate();
</script>
</body>
