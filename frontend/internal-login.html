<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmar Enterprises | Internal Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: -10;
            background-image:
                linear-gradient(rgba(16,185,129,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16,185,129,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .bg-glow {
            position: fixed; inset: 0; z-index: -9; pointer-events: none;
            background:
                radial-gradient(circle at 20% 30%, rgba(16,185,129,0.08), transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(34,211,238,0.06), transparent 40%);
        }
        .card {
            background: rgba(8,10,12,0.75);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 2.5rem 2.2rem;
            width: 420px;
            max-width: 92vw;
            box-shadow: 0 30px 70px rgba(0,0,0,0.6);
            animation: fadeUp 0.6s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
            color: rgba(16,185,129,0.9);
            padding: 6px 14px;
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: 999px;
            background: rgba(16,185,129,0.06);
            margin-bottom: 1.4rem;
        }
        .badge i { font-size: 0.55rem; }
        .title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 0.3rem; }
        .subtitle { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 2rem; }
        .field { margin-bottom: 1rem; }
        .field label {
            display: block; font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem; color: rgba(255,255,255,0.5);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
        }
        .field input {
            width: 100%; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
            padding: 12px 14px; color: #fff; font-family: 'Inter', sans-serif;
            font-size: 0.92rem; outline: none; transition: all 0.25s;
        }
        .field input:focus {
            border-color: rgba(16,185,129,0.7);
            background: rgba(16,185,129,0.04);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
        }
        .btn {
            width: 100%; padding: 13px; border: none; border-radius: 12px;
            font-weight: 700; font-size: 0.95rem; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: all 0.25s; margin-top: 1.2rem;
            background: linear-gradient(135deg, #10b981, #0ea5e9);
            color: #001a12; box-shadow: 0 10px 30px rgba(16,185,129,0.2);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(16,185,129,0.3); }
        .btn:disabled { opacity: 0.5; pointer-events: none; }
        .error-msg {
            display: none; color: #ef4444; font-size: 0.8rem; margin-top: 1rem;
            padding: 10px; border-radius: 8px;
            background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.15);
        }
        .footer-text {
            text-align: center; margin-top: 1.8rem;
            font-size: 0.68rem; color: rgba(255,255,255,0.25);
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="card">
        <div class="badge"><i class="fas fa-shield-halved"></i> Acceso Interno</div>
        <div class="title">Anmar Enterprises</div>
        <div class="subtitle">Panel de operaciones del equipo.</div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="field">
                <label>Usuario o Email</label>
                <input type="text" id="identifier" placeholder="tu.usuario" required autocomplete="username">
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn" id="loginBtn">
                <i class="fas fa-arrow-right-to-bracket"></i> Ingresar
            </button>
        </form>
        <div class="error-msg" id="errorMsg"></div>
        <div class="footer-text">&copy; 2026 anmarenterprices.com &middot; Internal Operations</div>
    </div>
    <script>
        const API = '/api';
        (async () => {
            try {
                const r = await fetch(API + '/internal/me', { credentials: 'include' });
                if (r.ok) window.location.replace('panel.html');
            } catch (_) {}
        })();
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('errorMsg');
            errEl.style.display = 'none';
            const identifier = document.getElementById('identifier').value.trim();
            const password = document.getElementById('password').value;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verificando...';
            try {
                const res = await fetch(API + '/internal/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ identifier, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('internalUser', JSON.stringify(data.user || data));
                    btn.innerHTML = '<i class="fas fa-check"></i> Acceso concedido';
                    btn.style.background = '#10b981';
                    setTimeout(() => window.location.href = 'panel.html', 600);
                } else {
                    throw new Error(data.error || 'Credenciales invalidas');
                }
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Ingresar';
            }
        }
    </script>
</body>
</html>
