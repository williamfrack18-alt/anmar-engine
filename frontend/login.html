<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>anmarenterprices.com | Secure Login</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #000;
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            color: #fff;
            display: flex; justify-content: center; align-items: center;
        }

        .video-background {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -100; pointer-events: none; overflow: hidden;
        }
        .video-background iframe {
            position: absolute; top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            transform: translate(-50%, -50%) scale(1.5);
            pointer-events: none; opacity: 0.35;
        }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, transparent 50%, rgba(0,0,0,0.18) 50%, rgba(0,0,0,0.18));
            background-size: 100% 4px;
            z-index: -50; pointer-events: none;
        }
        .green-tint {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 15% 10%, rgba(16,185,129,0.09), transparent 45%),
                        rgba(4, 8, 7, 0.84);
            z-index: -51; pointer-events: none;
        }

        .top-logo {
            position: fixed; top: 1.8rem; left: 2.2rem;
            color: #fff; text-decoration: none;
            font-size: 1rem; font-weight: 700; letter-spacing: -0.3px;
            z-index: 100; transition: color 0.25s;
        }
        .top-logo:hover { color: #10b981; }

        /* === CARD C: Bold headline === */
        .login-card {
            background: #090b0a;
            border: 1px solid rgba(255,255,255,0.07);
            border-left: 3px solid #10b981;
            border-radius: 20px;
            padding: 2.6rem 2.2rem 2.2rem;
            width: 430px;
            max-width: 92vw;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
            text-align: left;
            position: relative;
            z-index: 10;
            animation: floatUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }

        @keyframes floatUp {
            from { transform: translateY(24px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .card-inner { position: relative; z-index: 2; }

        /* Logo row */
        .logo-row {
            display: flex; align-items: center; gap: 9px;
            margin-bottom: 22px;
        }
        .logo-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #10b981;
            flex-shrink: 0;
        }
        .logo-text {
            font-size: 0.82rem; font-weight: 700;
            color: rgba(255,255,255,0.7);
            letter-spacing: -0.2px;
        }

        /* Headline */
        .brand-logo {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.8px;
            color: #fff;
            line-height: 1.18;
            margin-bottom: 8px;
        }
        .brand-subtitle {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.32);
            margin-bottom: 1.8rem;
            letter-spacing: 0.1px;
        }

        /* Google button */
        .google-btn {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 11px;
            padding: 13px 16px;
            color: rgba(255,255,255,0.85);
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            display: flex; align-items: center; gap: 11px;
            transition: background 0.2s, border-color 0.2s;
        }
        .google-btn:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.18); }
        .google-icon-wrap {
            width: 20px; height: 20px;
            border-radius: 4px;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .google-icon-wrap svg { width: 13px; height: 13px; }

        /* Divider */
        .social-divider {
            display: flex; align-items: center; gap: 10px;
            margin: 1.4rem 0 1.2rem;
            color: rgba(255,255,255,0.2);
            font-size: 0.7rem; letter-spacing: 0.4px;
        }
        .social-divider::before, .social-divider::after {
            content: ""; flex: 1; height: 1px;
            background: rgba(255,255,255,0.07);
        }

        /* Inputs */
        .input-group { margin-bottom: 0.85rem; }
        .input-label {
            font-size: 0.68rem; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            display: block; margin-bottom: 7px;
        }
        .input-field {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            padding: 13px 15px;
            border-radius: 11px;
            color: #fff;
            font-family: inherit;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .input-field::placeholder { color: rgba(255,255,255,0.2); }
        .input-field:focus {
            border-color: rgba(16,185,129,0.55);
            background: rgba(16,185,129,0.03);
        }

        /* CTA */
        .login-btn {
            width: 100%;
            background: #10b981;
            color: #03150f;
            border: none;
            padding: 14px 18px;
            border-radius: 11px;
            font-weight: 700;
            font-size: 0.93rem;
            font-family: inherit;
            cursor: pointer;
            margin-top: 0.35rem;
            transition: background 0.18s, transform 0.12s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .login-btn:hover { background: #0ea572; transform: translateY(-1px); }
        .login-btn:active { transform: translateY(0); }
        .login-btn .btn-arrow { font-size: 1.1rem; }

        /* Step row */
        .step-row {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-top: 0.7rem;
            font-size: 0.74rem;
            color: rgba(255,255,255,0.3);
        }
        .link-btn {
            background: none; border: none;
            color: #10b981; cursor: pointer;
            font-size: 0.74rem; font-family: inherit;
            padding: 0; transition: opacity 0.2s;
        }
        .link-btn:hover { opacity: 0.7; }

        /* T&C */
        .terms-check {
            display: flex; align-items: flex-start; gap: 10px;
            font-size: 0.73rem; color: rgba(255,255,255,0.35);
            margin-top: 1.1rem; line-height: 1.5;
        }
        .terms-check input[type="checkbox"] {
            margin-top: 2px; width: 14px; height: 14px;
            accent-color: #10b981; flex-shrink: 0;
        }
        .terms-check a { color: #10b981; text-decoration: none; }
        .terms-check a:hover { text-decoration: underline; }

        /* Status */
        .error-msg {
            color: #f87171; font-size: 0.78rem;
            margin-top: 12px; background: rgba(239,68,68,0.07);
            padding: 10px 12px; border-radius: 10px; display: none;
            border: 1px solid rgba(239,68,68,0.16);
        }
        .success-msg {
            color: #34d399; font-size: 0.78rem;
            margin-top: 12px; background: rgba(16,185,129,0.07);
            padding: 10px 12px; border-radius: 10px; display: none;
            border: 1px solid rgba(16,185,129,0.18);
        }

        .card-footer {
            margin-top: 1.8rem;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.16);
        }

        /* hide pill hint (not used in design C) */
        .subtle-hint { display: none; }
        .social-buttons { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    </style>
</head>

<body>
    <!-- TOP LOGO -->
    <a href="index.html" class="top-logo">Anmar Enterprises</a>

    <!-- BACKGROUNDS -->
    <div class="video-background"><iframe
            src="https://www.youtube.com/embed/Uc1NI4COG9k?autoplay=1&mute=1&loop=1&playlist=Uc1NI4COG9k&controls=0&showinfo=0&rel=0&iv_load_policy=3&disablekb=1&modestbranding=1&start=120"
            title="Background" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
    <div class="green-tint"></div>
    <div class="scanlines"></div>
    <canvas id="gravityCanvas"
        style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-40; pointer-events:none;"></canvas>

    <!-- CARD -->
    <div class="login-card">
        <div class="card-inner">

            <!-- Logo row -->
            <div class="logo-row">
                <div class="logo-dot"></div>
                <div class="logo-text">Anmar Enterprises</div>
            </div>

            <!-- Bold headline -->
            <div class="brand-logo">Sign in to<br>your account</div>
            <div class="brand-subtitle">Access your dashboard and projects</div>

            <!-- Google -->
            <div id="g_id_onload"
                data-client_id="676077959478-uo9f6h70osjmaeklm17ktithkualc4p3.apps.googleusercontent.com"
                data-context="signin" data-ux_mode="popup" data-callback="handleGoogleLogin"
                data-auto_prompt="false">
            </div>
            <div style="width:100%; display:flex; justify-content:center;" class="social-buttons">
                <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_black"
                    data-text="continue_with" data-size="large" data-logo_alignment="center" data-width="384">
                </div>
            </div>

            <div class="social-divider">or email</div>

            <!-- STEP 1: EMAIL -->
            <div id="emailStep">
                <div class="input-group">
                    <label class="input-label">Email address</label>
                    <input type="email" id="email" class="input-field" placeholder="you@example.com" required>
                </div>
                <button type="button" class="login-btn" id="continueBtn">
                    <span>Continue</span>
                    <span class="btn-arrow">→</span>
                </button>
            </div>

            <!-- STEP 2: DETAILS -->
            <form id="authForm" onsubmit="handleAuth(event)" style="display:none;">
                <div class="input-group" id="nameGroup" style="display:none;">
                    <label class="input-label">Full Name</label>
                    <input type="text" id="name" class="input-field" placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn" id="submitBtn">
                    <span id="btnText">Sign in</span>
                    <span class="btn-arrow">→</span>
                </button>
                <div class="step-row">
                    <span id="authHint"></span>
                    <button type="button" class="link-btn" id="changeEmailBtn">Change email</button>
                </div>
            </form>

            <!-- T&C -->
            <div class="terms-check" id="termsGroup">
                <input type="checkbox" id="termsAccepted">
                <label for="termsAccepted">
                    I agree to the <a href="terms.html" target="_blank" rel="noopener">Terms & Conditions</a> of Anmar Enterprises.
                </label>
            </div>

            <div id="statusMsg" class="error-msg"></div>

            <div class="card-footer">© 2026 anmarenterprices.com</div>
        </div>
    </div>

    <script>
        // --- AUTH LOGIC ---
        let mode = 'login'; // 'login' or 'register'
        const API_URL = '/api'; // Ensure this matches running port
        const urlParams = new URLSearchParams(window.location.search);
        const emailStep = document.getElementById('emailStep');
        const continueBtn = document.getElementById('continueBtn');
        const authForm = document.getElementById('authForm');
        const nameGroup = document.getElementById('nameGroup');
        const termsGroup = document.getElementById('termsGroup');
        const authHint = document.getElementById('authHint');
        const changeEmailBtn = document.getElementById('changeEmailBtn');

        // Keep session sticky: if already logged-in, skip login page.
        if (!urlParams.has('fresh')) {
            try {
                const storedUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
                if (storedUser && storedUser.email) {
                    window.location.replace('dashboard.html');
                }
            } catch (_) {
                localStorage.removeItem('currentUser');
            }
        }

        function setMode(nextMode) {
            mode = nextMode;
            const nameInput = document.getElementById('name');
            const termsAccepted = document.getElementById('termsAccepted');
            if (nameGroup && nameInput) {
                nameGroup.style.display = mode === 'register' ? 'block' : 'none';
                nameInput.required = mode === 'register';
            }
            if (termsGroup && termsAccepted) {
                termsAccepted.required = mode === 'register';
                if (mode !== 'register') termsAccepted.checked = false;
            }
            document.getElementById('btnText').textContent = mode === 'register' ? 'Create Account' : 'Sign in';
            if (authHint) {
                authHint.textContent = mode === 'register'
                    ? 'Create your account with this email.'
                    : 'Enter your password to continue.';
            }
        }

        function setStep(step) {
            if (emailStep) emailStep.style.display = step === 'email' ? 'block' : 'none';
            if (authForm) authForm.style.display = step === 'details' ? 'block' : 'none';
            showStatus('', '');
        }

        async function checkEmail() {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showStatus('Enter your email to continue.', 'error');
                return;
            }
            if (!continueBtn) return;
            continueBtn.disabled = true;
            continueBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';
            try {
                const res = await fetch(API_URL + '/check-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'No se pudo verificar el correo');
                setMode(data.exists ? 'login' : 'register');
                setStep('details');
            } catch (err) {
                showStatus(err.message || 'Error verificando el correo.', 'error');
            } finally {
                continueBtn.disabled = false;
                continueBtn.innerHTML = 'Continue <i class="fas fa-arrow-right"></i>';
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const termsAccepted = document.getElementById('termsAccepted')?.checked;
            const btn = document.getElementById('submitBtn');

            // UI Loading
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            showStatus('', '');

            try {
                let endpoint = mode === 'register' ? '/register' : '/login';
                let payload = { email, password };
                if (mode === 'register') {
                    if (!termsAccepted) {
                        showStatus('Debes aceptar los Términos y Condiciones.', 'error');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-fingerprint"></i> <span id="btnText">Crear Cuenta</span>';
                        return;
                    }
                    payload.name = name;
                    payload.termsAccepted = termsAccepted;
                }

                const res = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (res.ok) {
                    // SUCCESS
                    showStatus(data.message, 'success');

                    // SAVE USER SESSION
                    if (data.user) {
                        localStorage.setItem('currentUser', JSON.stringify(data.user));
                    }

                    btn.innerHTML = '<i class="fas fa-check"></i> Éxito';
                    btn.style.background = '#10b981';

                    if (mode === 'login') {
                        setTimeout(() => window.location.href = 'dashboard.html', 1000);
                    } else {
                        setTimeout(() => {
                            setMode('login');
                            setStep('details');
                            document.getElementById('email').value = email;
                            btn.disabled = false;
                        }, 1500);
                    }

                } else {
                    // ERROR
                    showStatus(data.error || "Error desconocido", 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-fingerprint"></i> <span id="btnText">' + (mode === 'register' ? 'Crear Cuenta' : 'Acceder') + '</span>';
                }

            } catch (err) {
                console.error(err);
                showStatus("Error de conexión con el servidor. Verifica que el puerto 5001 esté activo.", 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-redo"></i> Reintentar';
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.style.display = msg ? 'block' : 'none';
            el.className = type === 'success' ? 'success-msg' : 'error-msg';
        }

        async function processSocialLogin(provider, externalEmail = null, externalName = null, idToken = null) {
            // Simulador de datos para Apple. Para Google, exigimos datos reales.
            if (provider === 'Google' && !idToken) {
                showStatus("Fallo al autenticar tu cuenta de Google. Inténtalo de nuevo.", 'error');
                return;
            }

            const name = externalName || `${provider} User`;
            const email = externalEmail || `${provider.toLowerCase()}@anmarenterprices.com`;
            const termsAccepted = document.getElementById('termsAccepted')?.checked;

            const btn = document.getElementById('submitBtn');
            const el = document.getElementById('statusMsg');
            el.style.display = 'block';
            el.className = 'success-msg';
            el.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Conectando de forma segura con ${provider}...`;

            try {
                if (!termsAccepted) {
                    showStatus('Debes aceptar los Términos para crear cuenta con Google.', 'error');
                    return;
                }
                let bodyData = { provider };
                if (idToken) {
                    bodyData.token = idToken;
                } else {
                    bodyData.email = email;
                    bodyData.name = name;
                }
                bodyData.termsAccepted = termsAccepted;

                const res = await fetch(API_URL + '/social-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });

                const data = await res.json();

                if (res.ok) {
                    el.innerHTML = `<i class="fas fa-check"></i> ${data.message}. Entrando al Dashboard...`;
                    if (data.user) {
                        localStorage.setItem('currentUser', JSON.stringify(data.user));
                    }
                    setTimeout(() => window.location.href = 'dashboard.html', 1200);
                } else {
                    showStatus(data.error || "Error al conectar red social", 'error');
                }
            } catch (err) {
                console.error(err);
                showStatus(`Error conectando con ${provider}. Verifica conexión.`, 'error');
            }
        }

        function handleGoogleLogin(response) {
            // Esta función se llama automáticamente después del login de Google en la ventana emergente
            console.log("Autenticación exitosa en frontend, enviando Token al servidor...");

            // Ahora enviamos directamente el ID Token (la credencial) al backend para ser verificado oficialmente
            processSocialLogin('Google', null, null, response.credential);
        }

        if (continueBtn) {
            continueBtn.addEventListener('click', checkEmail);
        }
        const emailInput = document.getElementById('email');
        if (emailInput) {
            emailInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    checkEmail();
                }
            });
        }
        if (changeEmailBtn) {
            changeEmailBtn.addEventListener('click', () => {
                setStep('email');
                if (emailInput) emailInput.focus();
            });
        }

        setStep('email');

        // --- PARTICLES SCRIPT (Shared) ---
        const canvas = document.getElementById('gravityCanvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let mouse = { x: null, y: null, radius: (canvas.height / 80) * (canvas.width / 80) }
        window.addEventListener('mousemove', function (event) { mouse.x = event.x; mouse.y = event.y; });
        window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; mouse.radius = ((canvas.height / 80) * (canvas.height / 80)); init(); });
        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x; this.y = y; this.directionX = directionX; this.directionY = directionY; this.size = size; this.color = color;
            }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false); ctx.fillStyle = this.color; ctx.fill(); }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;
                let dx = mouse.x - this.x; let dy = mouse.y - this.y; let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius + this.size) {
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 3;
                    if (mouse.x > this.x && this.x > this.size * 10) this.x -= 3;
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 3;
                    if (mouse.y > this.y && this.y > this.size * 10) this.y -= 3;
                }
                this.x += this.directionX; this.y += this.directionY; this.draw();
            }
        }
        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 0.5) - 0.25;
                let directionY = (Math.random() * 0.5) - 0.25;
                particlesArray.push(new Particle(x, y, directionX, directionY, size, '#ffffff'));
            }
        }
        function animate() { requestAnimationFrame(animate); ctx.clearRect(0, 0, innerWidth, innerHeight); for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); } connect(); }
        function connect() { let opacityValue = 1; for (let a = 0; a < particlesArray.length; a++) { for (let b = a; b < particlesArray.length; b++) { let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y)); if (distance < (canvas.width / 7) * (canvas.height / 7)) { opacityValue = 1 - (distance / 20000); ctx.strokeStyle = 'rgba(255, 255, 255,' + opacityValue * 0.15 + ')'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke(); } } } }
        init(); animate();
    </script>
</body>

</html>
